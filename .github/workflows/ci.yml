name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  checks:
    name: Python lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: python-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            python-${{ matrix.python-version }}-

      - name: Install Python dependencies
        run: |
          python --version
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run Python lint
        run: |
          if [ -d . ]; then flake8 . || true; fi

      - name: Run Python tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ] || ls test*.py 1>/dev/null 2>&1; then pytest --maxfail=1 --disable-warnings; fi

      - name: Run dependency audit
        run: |
          python -m pip install pip-audit
          if [ -f requirements.txt ]; then python -m pip_audit; fi

  package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m build --sdist --wheel; fi

      - name: Upload package artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/**
            *.tar.gz
            *.whl
