name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  checks:
    name: Python lint and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: python-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            python-${{ matrix.python-version }}-

      - name: Install Python dependencies
        run: |
          python --version
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run Python lint
        run: |
          flake8 . || true

      - name: Run Python tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ] || ls test*.py 1>/dev/null 2>&1; then pytest --maxfail=1 --disable-warnings; fi

      - name: Run dependency audit
        run: |
          python -m pip install pip-audit
          if [ -f requirements.txt ]; then python -m pip_audit; fi

  package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m build --sdist --wheel; fi

      - name: Upload package artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/**
            *.tar.gz
            *.whl

  scheduled-poll:
    name: Scheduled polling job
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Poll configured URL
        env:
          POLL_URL: ${{ secrets.POLL_URL }}
        run: |
          if [ -z "$POLL_URL" ]; then
            POLL_URL="https://www.githubstatus.com/"
            echo "POLL_URL not set, using default: $POLL_URL"
          else
            echo "Polling configured URL: $POLL_URL"
          fi
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "$POLL_URL")
          echo "Received HTTP status: $http_code"
          if [ "$http_code" -ge 400 ]; then
            echo "Polling failed with HTTP status $http_code"
            exit 1
          fi
